akka.http {
  host-connection-pool {
    # akka-http keys a SEPARATE connection pool per host. The bot talks to two:
    #   - api.tibiadata.com   : the public API (world/guild/character firehose).
    #                           TibiaData absorbs this; we can push it hard.
    #   - the local instance  : Config.tibiadataApi (boosted/highscores + the
    #                           lvl>=250 bypass). CipSoft exponentially backs this
    #                           off, so it must stay conservative ("lowkey").
    #
    # This DEFAULT therefore governs the rate-sensitive local instance (and any
    # other host): keep it modest. The public host gets an aggressive override
    # below. Caching (boosted/highscores) already cuts the local instance's load.
    #   - if the local instance gets 429s/backoff, lower this (e.g. 8);
    max-connections = 16

    # Queue depth: absorbs a whole 60s polling cycle's burst across all worlds
    # instead of failing fast. Must be a power of two (4096 = 2^12).
    max-open-requests = 4096

    response-entity-subscription-timeout = 10.seconds

    # Per-host override: the public API is the ~133 req/s firehose. By Little's
    # law it needs ~rps * p95-latency connections to drain within the 60s cycle;
    # 16 cannot (16 conns sustain ~16/latency req/s). Size this from the
    # RequestMetrics "[req-probe] ... max-connections >= N" log line for
    # host=api.tibiadata.com (round up — see the probe's entity-drain caveat).
    # 64 is a sane interim (4x) pending those real numbers.
    per-host-override = [
      {
        host-pattern = "api.tibiadata.com"
        max-connections = 64
      }
    ]
  }
}

discord-config {
  token = ${TOKEN}
  postgres-password = ${POSTGRES_PASSWORD}
  postgres-host = ${POSTGRES_HOST}
  localapi-host = ${TIBIADATA_HOST}
  // Redis cache (optional). Unset env => empty host => caching disabled (NoopRedisCache),
  // so the bot runs unchanged without a Redis container.
  redis-host = ""
  redis-host = ${?REDIS_HOST}
  redis-port = 6379
  redis-port = ${?REDIS_PORT}
  redis-password = ""
  redis-password = ${?REDIS_PASSWORD}

  // ── Cache freshness — ONE place to tune how long cached TibiaData API
  //    responses are reused before re-fetching. HOCON duration units: s, m, h, d
  //    (e.g. 30m, 1h, 7d). Each is overridable by the matching CACHE_* env var.
  //    NOTE: these are the API-response cache TTLs only. Behavioural dedup /
  //    notification windows (death/level/online retention, DB cache cleanup) are
  //    deliberately NOT here — they change what gets posted and several are
  //    coupled pairs; they live in TibiaBot / JdbcCacheRepository.
  cache {
    boosted-ttl = 30m                                  # boosted boss + creature (Redis)
    boosted-ttl = ${?CACHE_BOOSTED_TTL}
    highscores-ttl = 30m                               # /leaderboards highscores (Redis)
    highscores-ttl = ${?CACHE_HIGHSCORES_TTL}
    world-list-ttl = 1h                                # world list, in-memory (changes only at game updates)
    world-list-ttl = ${?CACHE_WORLD_LIST_TTL}
    character-snapshot-ttl = 7d                        # R1 character-cache snapshot self-eviction (Redis)
    character-snapshot-ttl = ${?CACHE_CHARACTER_SNAPSHOT_TTL}
    character-snapshot-interval = 60s                  # how often that snapshot is written
    character-snapshot-interval = ${?CACHE_CHARACTER_SNAPSHOT_INTERVAL}
  }
  avatar-url = "https://raw.githubusercontent.com/Leo32onGIT/tibia-bot-resources/main/Violent%20Bot.png"
  fullbless-avatar-url = "https://raw.githubusercontent.com/Leo32onGIT/tibia-bot-resources/main/Amulet%20of%20Loss.png"
